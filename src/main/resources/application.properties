spring.application.name=rectangles

# This is a CLI tool, not a long-running shell — default to non-interactive
# execution. Users can opt back into the Spring Shell REPL with
# --spring.shell.interactive.enabled=true.
spring.shell.interactive.enabled=false

# Quiet the Spring Boot banner: it makes demo output noisy.
spring.main.banner-mode=off
logging.level.root=WARN
